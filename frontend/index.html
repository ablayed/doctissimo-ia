<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctissimo.IA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="/cursor-effects.js"></script>
    <script>
      window.addEventListener('load', () => {
        try {
          if (window.cursoreffects) {
            new window.cursoreffects.fairyDustCursor({
              colors: ['#FF1493', '#FF69B4', '#FFB6C1', '#E5007E', '#FFFF00'],
            });
          } else {
            document.body.style.cursor =
              "url(\"data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16'%3E%3Ctext x='1' y='12' font-size='12'%3E*%3C/text%3E%3C/svg%3E\") 0 12, auto";
          }
        } catch (_error) {
          document.body.style.cursor =
            "url(\"data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16'%3E%3Ctext x='1' y='12' font-size='12'%3E*%3C/text%3E%3C/svg%3E\") 0 12, auto";
        }
      });
    </script>
  </body>
</html>
